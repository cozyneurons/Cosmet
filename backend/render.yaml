services:
  # ⚠️  NOTE: Render only reads render.yaml from the REPOSITORY ROOT.
  # This file (backend/render.yaml) is NOT picked up by Render.
  # The active Render config is at /render.yaml (repo root).
  # This file is kept for reference only.
  - type: web
    name: cosmate-api
    env: python
    rootDir: ./backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false
